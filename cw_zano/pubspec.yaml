publish_to: none
homepage: https://cakewallet.com

environment:
  sdk: ">=2.19.0 <3.0.0"
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.0.1
  http: ^1.1.0
  path_provider: ^2.0.11
  mobx: ^2.1.4
